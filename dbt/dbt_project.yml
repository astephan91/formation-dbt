name: "demo_dbt_duckdb"
version: "1.0.0"
config-version: 2

profile: "demo_dbt_duckdb"

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

models:
  demo_dbt_duckdb:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: analytics

# make docs nicer
quoting:
  database: false
  schema: false
  identifier: false
